# Secret scan via the canonical reusable in molecule-ci (CI-reusables
# consolidation). Replaces the inlined per-repo copy with a native
# cross-repo workflow_call. Resolves on Gitea 1.26.4; proven green on
# molecule-ai-workspace-template-hermes#146. Pinned to a molecule-ci SHA.
# Job `name:` preserved so the required status context
# `Secret scan / Scan diff for credential-shaped strings` is unchanged.
name: Secret scan
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, staging]
jobs:
  scan:
    name: Scan diff for credential-shaped strings
    uses: molecule-ai/molecule-ci/.gitea/workflows/secret-scan.yml@7b2d4de108a8696344cd54fd783caa4d1ad682bc
