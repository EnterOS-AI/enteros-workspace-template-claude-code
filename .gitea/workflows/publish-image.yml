name: publish-image

# Builds the claude-code workspace template Dockerfile and pushes it to ECR as
# `<REGISTRY>/workspace-template-claude-code:latest` + `:sha-<7>`.
#
# Ported/inlined from molecule-ci's publish-template-image.yml reusable
# workflow. Cross-repo `uses:` is BLOCKED on Gitea 1.22.6 because
# DEFAULT_ACTIONS_URL=github causes the runner to attempt the lookup against
# github.com, which always 404s even for same-instance repos.
# (feedback_gitea_cross_repo_uses_blocked)
#
# Registry: production uses ECR (MOLECULE_IMAGE_REGISTRY env var on EC2 /
# Railway) backed by org-level AWS creds. The OSS default in registry.go is
# ghcr.io/molecule-ai but the ECR repo `molecule-ai/workspace-template-claude-code`
# already exists (created by the migration sweep). No GHCR token is in the
# credentials store — Gitea's GITHUB_TOKEN cannot authenticate to ghcr.io.
#
# Gitea 1.22.6 hostile-shape checklist applied:
#   - No workflow_dispatch.inputs (silently rejected on 1.22.6)
#   - No merge_group: trigger
#   - No cross-repo uses:
#   - GITHUB_SERVER_URL pinned at workflow level
#     (feedback_act_runner_github_server_url)
#   - No on.push.paths: (would permanently block path-excluded pushes)
#   - timeout-minutes on every job
#
# Cascade signal: molecule-core/publish-runtime.yml fans out by git-pushing
# an updated `.runtime-version` file to this repo's main branch, which trips
# the `on: push: branches: [main]` trigger here. The resolve-version job reads
# that file and forwards the version as a RUNTIME_VERSION docker build-arg so
# pip install resolves the exact fresh version.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # Belt-and-suspenders for act_runner runners regenerated without the
  # config.yaml envs block. (feedback_act_runner_github_server_url)
  GITHUB_SERVER_URL: https://git.moleculesai.app
  ECR_REGISTRY: 153263036946.dkr.ecr.us-east-2.amazonaws.com
  IMAGE_NAME: 153263036946.dkr.ecr.us-east-2.amazonaws.com/molecule-ai/workspace-template-claude-code
  AWS_DEFAULT_REGION: us-east-2

permissions:
  contents: read

jobs:
  resolve-version:
    name: Resolve runtime version
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      version: ${{ steps.read.outputs.version }}
      sha: ${{ steps.read.outputs.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: read
        shell: bash
        run: |
          if [ -f .runtime-version ]; then
            v="$(head -n1 .runtime-version | tr -d '[:space:]')"
            echo "version=${v}" >> "$GITHUB_OUTPUT"
            echo "resolved runtime version from .runtime-version: ${v}"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "no .runtime-version file — will use Dockerfile/requirements.txt pin"
          fi
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  publish:
    name: Build & push workspace-template-claude-code image
    # internal#512: pin to the dedicated Linux publish runners (label
    # "publish" → molecule-runner-publish-1/2). MUST NOT use `ubuntu-latest`:
    # that label is also advertised by the Windows/WSL self-hosted runners
    # (hongming-pc-runner-*), so this docker build/push job lands
    # non-deterministically on a Windows runner where `aws ecr
    # get-login-password | docker login --password-stdin` fails with
    # "Failed to initialize: protocol not available" and the image never
    # publishes. Placement-dependent, NOT a transient flake. Mirrors the
    # molecule-core convention (publish-workspace-server-image.yml /
    # publish-runtime.yml / publish-canvas-image.yml: `runs-on: publish`)
    # and the codex sibling fix (PR#9).
    # AND-of-labels: `publish` is also advertised by some
    # hongming-pc-runner-publish-* runners (Windows), whose runner-base
    # image (`docker-config-fix`) breaks `docker login --password-stdin`
    # with `Error saving credentials: mkdir /home/hongming: permission
    # denied` (same EACCES bug class as internal#597/#603 act_runner HOME
    # injection). op-host molecule-runner-publish-{1,2} are the only
    # runners advertising BOTH `publish` AND `release` (op-host
    # /opt/molecule/runners/config.publish.yaml lines 28-29). Requiring
    # both labels routes publish to op-host deterministically. Matches
    # template-codex tc#22 (merge 0fb25352).
    runs-on: [publish, release]
    timeout-minutes: 30
    needs: resolve-version
    # Bubble the Push step's digest to the job level so the downstream
    # `promote-pin` job can consume `needs.publish.outputs.digest`. Without
    # this block the expression resolves to "" at runtime. Job-level outputs
    # are the canonical Gitea/GHA mechanism for surfacing a step output across
    # a `needs:` edge — `steps.push.outputs.digest` is only visible WITHIN
    # this job's expression context. Mirrors the hermes sibling template.
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint — no bare imports of runtime modules
        # Catches `from <runtime_module> import ...` style bare imports that work in
        # the monorepo layout but explode at startup in the published container
        # (a failed import). Runs before Docker login so a bad import
        # returns red in seconds.
        # Fallback module list mirrors the runtime build script's published
        # top-level module list as of 2026-04-27.
        shell: bash
        run: |
          set -eu
          FALLBACK_MODULES='plugins|adapter_base|config|main|preflight|prompt|coordinator|consolidation|events|heartbeat|transcript_auth|runtime_wedge|watcher|skill_loader|policies|adapters|builtin_tools|executor_helpers|a2a_executor|a2a_client|a2a_tools|a2a_cli|a2a_mcp_server|agent|agents_md|initial_prompt|molecule_ai_status|platform_auth|shared_runtime'
          RUNTIME_MODULES=""
          mkdir -p /tmp/runtime-wheel
          if pip download --quiet molecule-ai-workspace-runtime --no-deps -d /tmp/runtime-wheel 2>/dev/null; then
            WHEEL=$(ls /tmp/runtime-wheel/*.whl 2>/dev/null | head -1)
            if [ -n "$WHEEL" ]; then
              RUNTIME_MODULES=$(unzip -p "$WHEEL" molecule_runtime/_runtime_modules.json 2>/dev/null \
                | python3 -c "import sys,json; m=json.load(sys.stdin); print('|'.join(sorted(set(m['top_level_modules']) | set(m['subpackages']))))" 2>/dev/null || echo "")
            fi
          fi
          if [ -n "$RUNTIME_MODULES" ]; then
            echo "::notice::lint module list from published wheel"
          else
            RUNTIME_MODULES="$FALLBACK_MODULES"
            echo "::warning::could not read _runtime_modules.json from wheel — using inline fallback"
          fi
          if HITS=$(grep -nE "^\s*from (${RUNTIME_MODULES}) import" *.py 2>/dev/null); then
            echo "::error::Bare imports of runtime modules found — use 'from molecule_runtime.<module> import'"
            echo "$HITS" | sed 's/^/  /'
            exit 1
          fi
          echo "::notice::no bare imports of runtime modules in *.py files"

      - name: Log in to ECR
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          aws ecr get-login-password --region us-east-2 | \
            docker login --username AWS --password-stdin "${ECR_REGISTRY}"

      - name: Verify Docker daemon access
        run: |
          set -euo pipefail
          docker info >/dev/null 2>&1 || {
            echo "::error::Docker daemon is not accessible — check runner sock mount"
            exit 1
          }
          echo "Docker daemon OK"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Ensure ECR repository exists
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          repo_path="${IMAGE_NAME#*/}"
          repo_path="${repo_path#*/}"  # strip registry host + first slash → molecule-ai/workspace-template-claude-code
          if ! aws ecr describe-repositories --repository-names "${repo_path}" --region us-east-2 >/dev/null 2>&1; then
            aws ecr create-repository \
              --repository-name "${repo_path}" \
              --image-scanning-configuration scanOnPush=true \
              --region us-east-2 >/dev/null
            echo "::notice::created ECR repository ${repo_path}"
          else
            echo "ECR repository ${repo_path} already exists"
          fi

      - name: Build image (load for smoke test, do not push yet)
        # Build into runner-local docker first. Smoke test runs before push so
        # a broken adapter module never poisons :latest.
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.IMAGE_NAME }}:sha-${{ needs.resolve-version.outputs.sha }}
          build-args: |
            RUNTIME_VERSION=${{ needs.resolve-version.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://git.moleculesai.app/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=Molecule AI workspace template — claude-code runtime

      - name: Smoke test — import every top-level module
        # Boot the locally-loaded image and import each top-level module to verify
        # all module-level imports resolve against the pip-installed runtime.
        shell: bash
        env:
          IMAGE: ${{ env.IMAGE_NAME }}:sha-${{ needs.resolve-version.outputs.sha }}
        run: |
          set -eu
          docker run --rm \
            -e WORKSPACE_ID=smoke-test \
            -e CLAUDE_CODE_OAUTH_TOKEN=sk-fake-smoke-token \
            -e ANTHROPIC_API_KEY=sk-fake-smoke-key \
            -e OPENAI_API_KEY=sk-fake-smoke-key \
            --entrypoint sh "${IMAGE}" -c '
            set -e
            cd /app
            for f in *.py; do
              [ "$f" = "__init__.py" ] && continue
              mod="${f%.py}"
              python3 -c "import $mod" || { echo "::error::failed to import $mod"; exit 1; }
              echo "  import $mod OK"
            done
          '
          echo "::notice::${IMAGE}: all top-level modules import cleanly"

      - name: Push image to ECR (post-smoke)
        id: push
        # Smoke passed — push both :latest and :sha-<7>. build-push-action
        # reuses the cached layers so this is a layer-push, not a rebuild.
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ needs.resolve-version.outputs.sha }}
          build-args: |
            RUNTIME_VERSION=${{ needs.resolve-version.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://git.moleculesai.app/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=Molecule AI workspace template — claude-code runtime

  promote-pin:
    # RFC internal#529 Layer A — auto-promote the just-pushed digest to
    # runtime_image_pins via the control-plane admin endpoint. Gitea 1.22.6
    # has no `workflow_run`, so promotion has to be a job in this same
    # workflow (cannot be a separate workflow listening on publish-image
    # success). Gated on `if: success()` so a failed publish (smoke red,
    # push red) never bumps any pin — promotion only ever runs AFTER a
    # green build/push.
    #
    # Dual-environment fan-out (this PR): the staging CP `runtime_image_pins`
    # is a SEPARATE SSOT from prod, so the canary `E2E Staging SaaS` boots
    # whatever staging's pin points at. Before this change the claude-code
    # template had NO promote job at all and hermes promoted ONLY to prod,
    # so staging pins never advanced past the pre-#85/#75 executor and the
    # canary failed reasoning models with "message contained no text
    # content". We now promote to BOTH prod (api.moleculesai.app) and
    # staging (staging-api.moleculesai.app).
    #
    # Per-target ISOLATION: `strategy.fail-fast: false` makes each matrix
    # leg independent — a prod-promote failure does NOT cancel/block the
    # staging-promote and vice-versa. Each leg is still fail-LOUD on a
    # non-2xx for ITS OWN target so a stranded pin is never hidden behind a
    # green workflow; one leg red turns the job red without suppressing the
    # other leg's attempt or outcome.
    name: Promote runtime_image_pins (CP admin)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [resolve-version, publish]
    if: ${{ success() && github.ref == 'refs/heads/main' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - env_name: prod
            cp_host: api.moleculesai.app
          - env_name: staging
            cp_host: staging-api.moleculesai.app
    steps:
      - name: POST /cp/admin/runtime-image/promote (${{ matrix.env_name }})
        env:
          # Each matrix leg reads its own environment's CP admin token. Both
          # secrets must be configured on this repo's CI for the respective
          # promote to run: CP_ADMIN_API_TOKEN (prod, already used by the
          # hermes promote) and CP_ADMIN_API_TOKEN_STAGING (staging — must be
          # provisioned with a STAGING control-plane admin token).
          PROD_TOKEN: ${{ secrets.CP_ADMIN_API_TOKEN }}
          STAGING_TOKEN: ${{ secrets.CP_ADMIN_API_TOKEN_STAGING }}
          ENV_NAME: ${{ matrix.env_name }}
          CP_HOST: ${{ matrix.cp_host }}
          TEMPLATE_NAME: claude-code
          IMAGE_DIGEST: ${{ needs.publish.outputs.digest }}
          GIT_SHA: ${{ needs.resolve-version.outputs.sha }}
        run: |
          set -euo pipefail
          if [ "${ENV_NAME}" = "prod" ]; then
            CP_ADMIN_API_TOKEN="${PROD_TOKEN}"
            TOKEN_SECRET_NAME="CP_ADMIN_API_TOKEN"
          else
            CP_ADMIN_API_TOKEN="${STAGING_TOKEN}"
            TOKEN_SECRET_NAME="CP_ADMIN_API_TOKEN_STAGING"
          fi
          if [ -z "${CP_ADMIN_API_TOKEN}" ]; then
            echo "::error::${TOKEN_SECRET_NAME} secret not configured on this repo — cannot promote ${ENV_NAME} pin"
            exit 1
          fi
          if [ -z "${IMAGE_DIGEST}" ]; then
            echo "::error::needs.publish.outputs.digest is empty — Push step did not expose digest"
            exit 1
          fi
          body=$(printf '{"template_name":"%s","image_digest":"%s","git_sha":"%s","notes":"auto-promote via publish-image.yml @ %s -> %s"}' \
            "${TEMPLATE_NAME}" "${IMAGE_DIGEST}" "${GIT_SHA}" "${GITHUB_SHA}" "${ENV_NAME}")
          echo "::notice::POST runtime-image/promote env=${ENV_NAME} host=${CP_HOST} template=${TEMPLATE_NAME} digest=${IMAGE_DIGEST} git_sha=${GIT_SHA}"
          # Capture body + status separately; fail-loud on non-2xx so a
          # silent 4xx never strands the pin behind a green workflow.
          resp=$(mktemp)
          code=$(curl -sS -o "${resp}" -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${CP_ADMIN_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${body}" \
            "https://${CP_HOST}/cp/admin/runtime-image/promote")
          echo "HTTP ${code}"
          cat "${resp}"
          echo
          if [ "${code}" != "200" ] && [ "${code}" != "201" ]; then
            echo "::error::${ENV_NAME} promote failed (HTTP ${code})"
            exit 1
          fi
          echo "::notice::${ENV_NAME} runtime_image_pins.${TEMPLATE_NAME} bumped to ${IMAGE_DIGEST}"

  publish-platform-agent:
    # RFC platform-agent §5.7 — build the dedicated molecule-platform-agent image
    # HERE (not molecule-ci) so it reuses this repo's ECR creds + publish runners,
    # with NO new secret. It is FROM the workspace-template-claude-code image the
    # `publish` job just pushed, and bakes @molecule-ai/mcp-server from the org's
    # Gitea npm registry (anonymous read — no token / no cross-repo checkout).
    #
    # Auto pin-promote (#162): the `promote-platform-agent-pin` job below now
    # promotes the `platform-agent` runtime_image_pins entry to this image's
    # digest, mirroring `promote-pin` for claude-code. RATIONALE: the concierge
    # IS this image (claude-code base + baked org MCP), so the runtime fix that
    # ships in the claude-code pin must also reach the concierge — leaving the
    # platform-agent pin operator-gated meant a runtime bump silently advanced
    # the claude-code pin while the concierge kept booting the stale digest.
    # That stranded the RCA#2970 online gate: test1's concierge fail-closed on
    # `/opt/molecule-mcp-server missing` for 3 days because the v0.3.43 fix
    # (recognize plugin-delivered MCP) was built into this image but the
    # platform-agent pin still pointed at the pre-fix sha-201a5fa. Auto-promote
    # keeps the concierge pin lock-step with the build, same as every workspace
    # runtime. Rollback is the existing DELETE/promote-by-digest admin surface.
    name: Build & push molecule-platform-agent image
    runs-on: [publish, release]
    timeout-minutes: 30
    needs: [resolve-version, publish]
    if: ${{ success() && github.ref == 'refs/heads/main' }}
    env:
      PA_IMAGE_NAME: 153263036946.dkr.ecr.us-east-2.amazonaws.com/molecule-ai/molecule-platform-agent
    # Bubble the Push step's digest to the job level so the downstream
    # `promote-platform-agent-pin` job can consume
    # `needs.publish-platform-agent.outputs.digest` (mirrors the `publish`
    # job's digest output — a step output is not visible across a `needs:`
    # edge).
    outputs:
      digest: ${{ steps.pa_push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to ECR
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          aws ecr get-login-password --region us-east-2 | \
            docker login --username AWS --password-stdin "${ECR_REGISTRY}"

      - name: Ensure ECR repository exists
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          # Strip ONLY the registry host → molecule-ai/molecule-platform-agent.
          # (The base job's double-strip drops the molecule-ai/ namespace and only
          # works because its repo pre-exists from the migration sweep; this repo
          # does NOT, so the namespace must be kept or describe/create + push
          # disagree — the push targets the full molecule-ai/... path.)
          repo_path="${PA_IMAGE_NAME#*/}"
          if ! aws ecr describe-repositories --repository-names "${repo_path}" --region us-east-2 >/dev/null 2>&1; then
            aws ecr create-repository --repository-name "${repo_path}" \
              --image-scanning-configuration scanOnPush=true --region us-east-2 >/dev/null
            echo "::notice::created ECR repository ${repo_path}"
          else
            echo "ECR repository ${repo_path} already exists"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image (load for smoke test, do not push yet)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile.platform-agent
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.PA_IMAGE_NAME }}:sha-${{ needs.resolve-version.outputs.sha }}
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_NAME }}:sha-${{ needs.resolve-version.outputs.sha }}
          labels: |
            org.opencontainers.image.source=https://git.moleculesai.app/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=Molecule AI org-level platform agent (claude-code + org-management MCP)

      - name: Smoke test — Node 20 + baked molecule-mcp on PATH + adapter name + PYTHONPATH
        env:
          IMAGE: ${{ env.PA_IMAGE_NAME }}:sha-${{ needs.resolve-version.outputs.sha }}
        run: |
          set -eu
          docker run --rm --entrypoint sh "${IMAGE}" -c '
            node --version | grep -E "^v20\." || { echo "::error::node is not v20"; exit 1; }
            command -v molecule-platform-mcp >/dev/null || { echo "::error::molecule-platform-mcp not on PATH"; exit 1; }
            # The symlink must resolve to the npm package, NOT the runtime
            # wheel'"'"'s Python a2a bridge (the molecule-mcp PATH collision,
            # pilot RCA 2026-06-10) — and management mode must serve the
            # org-admin registry (serverInfo molecule-platform), proving the
            # baked version postdates the registry split.
            SERVER_NAME=$(printf "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"smoke\",\"version\":\"0\"}}}\n" | MOLECULE_MCP_MODE=management timeout 15 molecule-platform-mcp 2>/dev/null | head -1 | grep -o "\"name\": *\"[a-z-]*\"" | head -1) || true
            echo "$SERVER_NAME" | grep -q "molecule-platform" || { echo "::error::management mode did not serve the org-admin registry (got: $SERVER_NAME)"; exit 1; }
            # The runtime boots via its console-script entrypoint, which does
            # not add the CWD to sys.path. This image is run by a runner that
            # does not inject PYTHONPATH, so the image must self-set it or the
            # runtime fails to start when the import fails. Assert it from a
            # fresh cwd so a regression is caught at build time.
            [ "${PYTHONPATH:-}" = "/app" ] || { echo "::error::PYTHONPATH does not match the expected runtime value (got: ${PYTHONPATH:-unset})"; exit 1; }
            cd / && python3 -c "import adapter; assert adapter.Adapter.name() == '\''claude-code'\'', adapter.Adapter.name()" || { echo "::error::platform-agent image does not report claude-code adapter"; exit 1; }
            echo "platform-agent image smoke OK: node20 + molecule-mcp + claude-code adapter + PYTHONPATH"
          '

      - name: Push image to ECR (post-smoke)
        id: pa_push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile.platform-agent
          platforms: linux/amd64
          push: true
          # provenance/sbom OFF: with attestations on, buildx pushes an OCI
          # image *index* (vnd.oci.image.index.v1+json) instead of a plain
          # image manifest. ECR stores the index but `list-images` /the docker
          # pull path on a FRESH repo don't surface it — the first publish went
          # green (buildx logged a digest) yet the repo stayed empty. A plain
          # single-platform manifest pushes + lists normally. (The base image
          # masked this because its manifest already existed in ECR.)
          provenance: false
          sbom: false
          tags: |
            ${{ env.PA_IMAGE_NAME }}:latest
            ${{ env.PA_IMAGE_NAME }}:sha-${{ needs.resolve-version.outputs.sha }}
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_NAME }}:sha-${{ needs.resolve-version.outputs.sha }}
          labels: |
            org.opencontainers.image.source=https://git.moleculesai.app/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=Molecule AI org-level platform agent (claude-code + org-management MCP)

  promote-platform-agent-pin:
    # #162 — auto-promote the just-pushed molecule-platform-agent digest to the
    # `platform-agent` runtime_image_pins entry, mirroring `promote-pin` for the
    # claude-code workspace image. Without this the concierge pin drifts behind
    # the runtime: a runtime bump rebuilds + repins claude-code but the concierge
    # (which IS this image) keeps booting the last hand-promoted digest, so a
    # runtime-level concierge fix never reaches it. That stranded test1's RCA#2970
    # online gate (`/opt/molecule-mcp-server missing`) for 3 days — the v0.3.43
    # plugin-MCP-recognition fix was baked into this image but the pin still
    # pointed at the pre-fix sha-201a5fa.
    #
    # Same matrix + token + fail-loud shape as `promote-pin`. Per-target
    # isolation via fail-fast:false; non-2xx for a target turns the job red so a
    # stranded concierge pin is never hidden behind a green workflow. The digest
    # promoted is the molecule-platform-agent image digest (NOT the claude-code
    # base) — CP resolves the concierge via resolvePlatformAgentImage, which
    # composes the molecule-platform-agent repo name + this pinned digest.
    name: Promote platform-agent runtime_image_pins (CP admin)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [resolve-version, publish-platform-agent]
    if: ${{ success() && github.ref == 'refs/heads/main' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - env_name: prod
            cp_host: api.moleculesai.app
          - env_name: staging
            cp_host: staging-api.moleculesai.app
    steps:
      - name: POST /cp/admin/runtime-image/promote (platform-agent, ${{ matrix.env_name }})
        env:
          PROD_TOKEN: ${{ secrets.CP_ADMIN_API_TOKEN }}
          STAGING_TOKEN: ${{ secrets.CP_ADMIN_API_TOKEN_STAGING }}
          ENV_NAME: ${{ matrix.env_name }}
          CP_HOST: ${{ matrix.cp_host }}
          TEMPLATE_NAME: platform-agent
          IMAGE_DIGEST: ${{ needs.publish-platform-agent.outputs.digest }}
          GIT_SHA: ${{ needs.resolve-version.outputs.sha }}
        run: |
          set -euo pipefail
          if [ "${ENV_NAME}" = "prod" ]; then
            CP_ADMIN_API_TOKEN="${PROD_TOKEN}"
            TOKEN_SECRET_NAME="CP_ADMIN_API_TOKEN"
          else
            CP_ADMIN_API_TOKEN="${STAGING_TOKEN}"
            TOKEN_SECRET_NAME="CP_ADMIN_API_TOKEN_STAGING"
          fi
          if [ -z "${CP_ADMIN_API_TOKEN}" ]; then
            echo "::error::${TOKEN_SECRET_NAME} secret not configured on this repo — cannot promote ${ENV_NAME} platform-agent pin"
            exit 1
          fi
          if [ -z "${IMAGE_DIGEST}" ]; then
            echo "::error::needs.publish-platform-agent.outputs.digest is empty — Push step did not expose digest"
            exit 1
          fi
          body=$(printf '{"template_name":"%s","image_digest":"%s","git_sha":"%s","notes":"auto-promote platform-agent via publish-image.yml @ %s -> %s"}' \
            "${TEMPLATE_NAME}" "${IMAGE_DIGEST}" "${GIT_SHA}" "${GITHUB_SHA}" "${ENV_NAME}")
          echo "::notice::POST runtime-image/promote env=${ENV_NAME} host=${CP_HOST} template=${TEMPLATE_NAME} digest=${IMAGE_DIGEST} git_sha=${GIT_SHA}"
          resp=$(mktemp)
          code=$(curl -sS -o "${resp}" -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${CP_ADMIN_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${body}" \
            "https://${CP_HOST}/cp/admin/runtime-image/promote")
          echo "HTTP ${code}"
          cat "${resp}"
          echo
          if [ "${code}" != "200" ] && [ "${code}" != "201" ]; then
            echo "::error::${ENV_NAME} platform-agent promote failed (HTTP ${code})"
            exit 1
          fi
          echo "::notice::${ENV_NAME} runtime_image_pins.${TEMPLATE_NAME} bumped to ${IMAGE_DIGEST}"

